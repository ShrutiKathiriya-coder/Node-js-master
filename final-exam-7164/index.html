<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple JavaScript Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2> Simple JavaScript Quiz</h2>

    <div id="timer">⏳ Time Left: <span id="time">20</span> sec</div>

    <div id="question-box">
      <h3 id="question">Loading question...</h3>
      <ul id="options"></ul>
    </div>

    <div class="buttons">
      <button id="prevBtn">⬅ Previous</button>
      <button id="nextBtn">Next ➡</button>
    </div>

    <p id="priview">1 of 5 Questions</p>
    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
